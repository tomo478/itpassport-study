<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITパスポート にゃんこ合格道場</title>
<style>
:root{
  --paper:#f6f1e7; --paper2:#efe8d9; --ink:#1e2430; --ink2:#4a5264;
  --shu:#cf3b26; --shu-soft:#f3d9d2; --indigo:#274b6d; --indigo-soft:#dde7ee;
  --matcha:#5c7a4e; --matcha-soft:#e2ead9; --gold:#b08a3c;
  --line:#d8cfbc; --ok:#3e7d4f; --ng:#b5372a;
  --serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho","BIZ UDMincho",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic","BIZ UDGothic",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:linear-gradient(180deg,#fffdfd 0%,#fff7fb 52%,#fefcf7 100%);color:var(--ink);font-family:var(--sans);line-height:1.75;
  background-image:
    radial-gradient(circle at 18px 18px, rgba(255,123,165,.10) 0 4px, transparent 4.5px),
    radial-gradient(circle at 34px 12px, rgba(140,156,255,.10) 0 3px, transparent 3.5px),
    radial-gradient(circle at 10px 36px, rgba(117,181,139,.10) 0 3px, transparent 3.5px),
    linear-gradient(180deg,#fffdfd 0%,#fff7fb 52%,#fefcf7 100%);
  background-size:52px 52px,52px 52px,52px 52px,auto;}
body::before,body::after{content:"🐾";position:fixed;font-size:26px;opacity:.14;pointer-events:none;z-index:0}
body::before{left:14px;bottom:18px;transform:rotate(-16deg)}
body::after{right:18px;top:110px;transform:rotate(14deg)}
button{font-family:inherit;cursor:pointer}
/* header */
header{position:sticky;top:0;z-index:50;background:rgba(255,250,252,.92);backdrop-filter:blur(12px);
  border-bottom:2px solid #f3d5e3;box-shadow:0 8px 18px rgba(232,168,196,.16)}
.hwrap{max-width:1060px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:14px;position:relative}
.mark{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,#ff9ec0,#ff7ba5);color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:24px;flex-shrink:0;box-shadow:0 0 0 3px #fff,0 10px 18px rgba(255,123,165,.25);position:relative}.mark::before,.mark::after{content:"";position:absolute;top:-7px;width:14px;height:14px;background:#ff97bb;border-radius:4px 12px 4px 12px}.mark::before{left:8px;transform:rotate(-30deg)}.mark::after{right:8px;transform:rotate(30deg)}
.htitle{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:.04em;line-height:1.2}
.hsub{font-size:10.5px;color:#9b8fa0;letter-spacing:.14em}
nav{max-width:1060px;margin:0 auto;padding:0 10px 6px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{border:none;background:#fff6fa;padding:9px 14px 11px;font-size:13.5px;font-weight:700;color:var(--ink2);
  border:1.5px solid #f3dbe7;border-radius:999px;white-space:nowrap;letter-spacing:.04em;box-shadow:0 4px 10px rgba(230,197,214,.15)}
.tab.on{color:#fff;background:linear-gradient(135deg,#ff9ec0,#ff7ba5);border-color:#ff7ba5;box-shadow:0 6px 12px rgba(255,123,165,.28)}
main{max-width:1060px;margin:0 auto;padding:22px 16px 80px}
/* generic */
h2.pg{font-family:var(--serif);font-size:25px;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.pgsub{color:var(--ink2);font-size:13px;margin-bottom:20px}
.card{background:rgba(255,255,255,.92);border:1.5px solid var(--line);border-radius:22px;padding:18px 20px;box-shadow:0 10px 24px rgba(228,196,214,.18)}
.fieldchip{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;letter-spacing:.05em;box-shadow:0 2px 6px rgba(210,180,196,.16)}
.f-strategy{background:var(--shu-soft);color:var(--shu)}
.f-management{background:var(--matcha-soft);color:var(--matcha)}
.f-technology{background:var(--indigo-soft);color:var(--indigo)}
.btn{display:inline-block;border:2px solid #d9a9bd;background:#fffdfd;color:var(--ink);border-radius:999px;
  padding:10px 18px;font-size:14px;font-weight:700;box-shadow:0 6px 0 #f3d8e3;transition:.12s}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 #f3d8e3}
.btn.pri{background:linear-gradient(135deg,#ff97bb,#ff7ba5);border-color:#ff7ba5;color:#fff;box-shadow:0 6px 0 #e46c93}
.btn.sm{padding:5px 12px;font-size:12.5px}
.btn:disabled{opacity:.4;pointer-events:none}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
/* home */
.hero{position:relative;background:linear-gradient(135deg,#fffafc 0%,#fff3f8 55%,#fff9ed 100%);border:2px solid #f2d0df;border-radius:28px;
  padding:28px 24px;margin-bottom:22px;overflow:hidden;box-shadow:0 14px 28px rgba(236,196,214,.24)}
.hero::after{content:"にゃ";position:absolute;right:10px;bottom:-6px;font-size:110px;font-weight:700;
  color:rgba(255,123,165,.10);line-height:1;pointer-events:none}
.hero h2{font-family:var(--serif);font-size:clamp(22px,4.5vw,30px);letter-spacing:.04em;margin-bottom:8px}
.hero p{font-size:13.5px;color:var(--ink2);max-width:600px}
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat{background:#fffefe;border:1.5px solid var(--line);border-radius:20px;padding:13px 15px;box-shadow:0 8px 18px rgba(233,205,220,.16)}
.stat .lb{font-size:11px;color:var(--ink2);letter-spacing:.08em}
.stat .vl{font-family:var(--serif);font-size:26px;font-weight:700}
.stat .vl small{font-size:13px;font-weight:400;color:var(--ink2)}
.bar{height:9px;background:#fbe7ef;border-radius:99px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--shu);transition:width .5s}
.roadmap{counter-reset:step}
.rstep{display:flex;gap:14px;padding:13px 4px;border-bottom:1px dashed #edd4df}
.rstep:last-child{border-bottom:none}
.rstep::before{counter-increment:step;content:counter(step,decimal-leading-zero);font-family:var(--serif);font-size:21px;font-weight:700;color:var(--gold);flex-shrink:0;width:36px}
.rstep b{display:block;font-size:14.5px}
.rstep span{font-size:12.5px;color:var(--ink2)}
/* lessons */
.chcard{display:flex;flex-direction:column;gap:7px;text-align:left;border:1.5px solid var(--line);background:#fffdfd;border-radius:22px;
  padding:15px 17px;box-shadow:0 10px 22px rgba(228,196,214,.18);transition:.12s}
.chcard:hover{transform:translateY(-2px)}
.chcard .tt{font-family:var(--serif);font-size:16.5px;font-weight:700;line-height:1.45}
.chcard .mt{font-size:11.5px;color:var(--ink2);display:flex;gap:10px;align-items:center}
.done-pill{font-size:10.5px;font-weight:700;color:var(--ok);border:1.5px solid var(--ok);border-radius:99px;padding:0 8px}
.lesson h3{font-family:var(--serif);font-size:19px;border-left:4px solid var(--shu);padding-left:10px;margin:26px 0 10px}
.lesson p{font-size:14.5px;margin-bottom:10px}
.term-tip{border:none;background:linear-gradient(transparent 62%,#ffe4ef 62%);color:var(--shu);font-weight:700;padding:0 2px;border-radius:5px;box-shadow:none;cursor:pointer}
.term-tip.on{background:#ffe4ef;box-shadow:0 0 0 1px #f2b7cf}
.term-memo{display:inline-block;margin:4px 3px;padding:6px 9px;border:1.5px solid #f1d6e2;border-radius:12px;background:#fff7fb;color:#6f5365;font-size:12.5px;line-height:1.55;vertical-align:baseline;box-shadow:0 6px 14px rgba(236,196,214,.18)}
.term-memo b{color:#ff6d9c}
.lesson .point{background:var(--shu-soft);border-radius:8px;padding:11px 14px;font-size:13.5px;margin:12px 0;border-left:4px solid var(--shu)}
.lesson .point b{color:var(--shu)}
.termtbl{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:8px}
.termtbl th{font-family:var(--serif);text-align:left;border-bottom:2px solid var(--ink);padding:6px 8px;font-size:13px}
.termtbl td{border-bottom:1px solid var(--line);padding:8px;vertical-align:top}
.termtbl td:first-child{font-weight:700;white-space:nowrap;width:1%;padding-right:14px}
.backrow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
/* flashcards */
.fcard{max-width:560px;margin:0 auto;perspective:1200px}
.fcinner{position:relative;min-height:240px;border:2px solid #ecc9d7;border-radius:28px;background:linear-gradient(180deg,#fffefe,#fff7fb);
  box-shadow:0 14px 28px rgba(236,196,214,.22);display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;cursor:pointer}
.fcinner .term{font-family:var(--serif);font-size:clamp(20px,5vw,28px);font-weight:700;letter-spacing:.04em}
.fcinner .def{font-size:14.5px;line-height:1.9;text-align:left}
.fchint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:var(--ink2);letter-spacing:.1em}
.fcbtns{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
/* quiz */
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--ink2);margin-bottom:10px;flex-wrap:wrap;gap:6px}
.qtext{font-family:var(--serif);font-size:17px;font-weight:700;line-height:1.8;margin-bottom:16px;white-space:pre-wrap}
.choice{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;background:#fffefe;border:1.5px solid var(--line);
  border-radius:18px;padding:12px 14px;font-size:14px;margin-bottom:9px;line-height:1.65;transition:.1s;box-shadow:0 5px 12px rgba(236,216,226,.15)}
.choice:hover{border-color:var(--ink)}
.choice .mk{font-family:var(--serif);font-weight:700;flex-shrink:0;width:24px;height:24px;border:1.5px solid var(--ink2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;margin-top:1px}
.choice.sel-ok{border-color:var(--ok);background:#edf5ee;box-shadow:0 0 0 1.5px var(--ok)}
.choice.sel-ng{border-color:var(--ng);background:#f9ecea;box-shadow:0 0 0 1.5px var(--ng)}
.choice.reveal-ok{border-color:var(--ok)}
.choice:disabled{cursor:default}
.expl{border:1.5px solid var(--line);border-left:5px solid var(--gold);background:#fffaf0;border-radius:18px;padding:13px 16px;font-size:13.5px;margin-top:6px}
.expl b{font-family:var(--serif)}
.verdict{font-family:var(--serif);font-size:19px;font-weight:700;margin:4px 0 10px}
.verdict.ok{color:var(--ok)} .verdict.ng{color:var(--ng)}
.progress-top{height:7px;background:var(--paper2);border-radius:99px;overflow:hidden;margin-bottom:18px}
.progress-top i{display:block;height:100%;background:var(--indigo);transition:width .3s}
/* result */
.scorebig{font-family:var(--serif);font-size:54px;font-weight:700;line-height:1.1}
.scorebig small{font-size:18px;color:var(--ink2)}
.passband{display:inline-block;font-family:var(--serif);font-size:17px;font-weight:700;padding:5px 18px;border-radius:99px;margin:8px 0 16px}
.passband.ok{background:var(--matcha-soft);color:var(--ok);border:2px solid var(--ok)}
.passband.ng{background:var(--shu-soft);color:var(--ng);border:2px solid var(--ng)}
.fbreak{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px}
.setuprow{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.opt{border:1.5px solid var(--line);background:#fffdfd;border-radius:999px;padding:7px 16px;font-size:13.5px;font-weight:700;color:var(--ink2);box-shadow:0 4px 10px rgba(228,196,214,.12)}
.opt.on{border-color:#ff8db2;color:#ff6e9b;background:#ffe3ed}
.note{font-size:12px;color:var(--ink2)}
.empty{color:var(--ink2);font-size:14px;text-align:center;padding:34px 10px}
.mockhist td,.mockhist th{font-size:13px;padding:7px 9px;border-bottom:1px solid var(--line);text-align:left}
.mockhist th{font-family:var(--serif);border-bottom:2px solid #e4bccd}
.timer{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--indigo)}
.tag-weak{font-size:10.5px;color:var(--ng);border:1px solid var(--ng);border-radius:99px;padding:0 7px;font-weight:700}

.hero-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(180px,.6fr);gap:18px;align-items:center}
.kira{display:inline-flex;align-items:center;gap:8px;background:#fff6b8;color:#8f6e14;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;margin-bottom:12px;box-shadow:0 6px 14px rgba(255,207,123,.22)}
.catline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
.cat-pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #f1d6e2;border-radius:999px;padding:6px 10px;font-size:12px;color:#8b7b8f}
.cat-mascot-wrap{display:flex;justify-content:center}
.cat-mascot{width:164px;height:164px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#fff 0 18px,transparent 19px),linear-gradient(180deg,#fffdfd,#ffe7f0);border:2px solid #f1d6e2;position:relative;box-shadow:0 12px 26px rgba(236,196,214,.26)}
.cat-mascot::before,.cat-mascot::after{content:"";position:absolute;top:-18px;width:44px;height:44px;background:linear-gradient(180deg,#ffd7e6,#ffbfd4);border:2px solid #f1d6e2;z-index:0}
.cat-mascot::before{left:24px;border-radius:10px 28px 8px 28px;transform:rotate(-18deg)}
.cat-mascot::after{right:24px;border-radius:28px 10px 28px 8px;transform:rotate(18deg)}
.cat-face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:74px;z-index:1}
.cat-face span{transform:translateY(8px)}
.cat-bubble{position:absolute;right:-8px;top:12px;background:#fff;border:1.5px solid #f1d6e2;border-radius:18px 18px 18px 6px;padding:9px 12px;font-size:12px;line-height:1.5;color:#8d6d82;box-shadow:0 8px 18px rgba(236,196,214,.18)}
.cat-bubble b{color:#ff6d9c}
.pg::after{content:" ᓚᘏᗢ";font-size:.9em;color:#ff9bbd}
.note-cat{background:#fff9e9;border:1.5px dashed #f1d48a;border-radius:18px;padding:11px 14px;margin-top:10px;font-size:12.5px;color:#8b7345}
.empty{background:rgba(255,255,255,.6);border-radius:20px}

.complete-overlay{
  position:fixed;
  inset:0;
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(84,72,95,.22);
  backdrop-filter:blur(4px);
  animation:fadeIn .14s ease-out;
}

.complete-prompt{
  width:min(520px,100%);
  background:linear-gradient(135deg,#fff7fb,#fffaf0);
  border:2px solid #f2d0df;
  border-radius:28px;
  padding:24px 22px;
  box-shadow:0 22px 48px rgba(145,95,120,.28);
  animation:popIn .18s ease-out;
  text-align:center;
}

.complete-prompt .complete-title{
  font-family:var(--serif);
  font-size:22px;
  font-weight:700;
  color:#ff6e9b;
  margin-bottom:6px;
}

.complete-prompt .complete-text{
  font-size:14px;
  color:var(--ink2);
  margin-bottom:18px;
}

.complete-prompt .complete-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes popIn{
  from{opacity:0;transform:translateY(8px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}


/* にゃんこ演出 */
.float-paws{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

.float-paws span{
  position:absolute;
  bottom:-40px;
  font-size:18px;
  opacity:.12;
  animation:pawFloat linear infinite;
}

.float-paws span:nth-child(1){left:8%;animation-duration:15s;animation-delay:0s}
.float-paws span:nth-child(2){left:22%;animation-duration:18s;animation-delay:3s}
.float-paws span:nth-child(3){left:44%;animation-duration:16s;animation-delay:6s}
.float-paws span:nth-child(4){left:66%;animation-duration:20s;animation-delay:2s}
.float-paws span:nth-child(5){left:84%;animation-duration:17s;animation-delay:5s}
.float-paws span:nth-child(6){left:93%;animation-duration:23s;animation-delay:8s}

@keyframes pawFloat{
  0%{transform:translateY(0) rotate(0deg) scale(.8);opacity:0}
  12%{opacity:.14}
  70%{opacity:.12}
  100%{transform:translateY(-110vh) rotate(28deg) scale(1.1);opacity:0}
}

.cat-cutin{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:260;
  display:flex;
  align-items:center;
  gap:12px;
  max-width:min(440px,calc(100vw - 36px));
  background:linear-gradient(135deg,#fff,#fff5fa);
  border:2px solid #f2d0df;
  border-radius:999px 28px 28px 999px;
  padding:10px 16px 10px 10px;
  box-shadow:0 18px 44px rgba(145,95,120,.28);
  transform:translateX(calc(100% + 30px));
  opacity:0;
  pointer-events:none;
}

.cat-cutin.show{
  animation:catCutIn 3.2s ease-in-out forwards;
}

.cat-cutin-face{
  width:54px;
  height:54px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:linear-gradient(135deg,#ffe4ee,#fff9ed);
  border:2px solid #f2d0df;
  font-size:31px;
  animation:catWiggle 1.2s ease-in-out infinite;
}

.cat-cutin-text{
  font-weight:700;
  font-size:14px;
  color:var(--ink);
  line-height:1.5;
}

.cat-cutin-text small{
  display:block;
  color:#ff6e9b;
  font-size:11px;
  letter-spacing:.08em;
}

@keyframes catCutIn{
  0%{transform:translateX(calc(100% + 30px));opacity:0}
  14%{transform:translateX(0);opacity:1}
  82%{transform:translateX(0);opacity:1}
  100%{transform:translateX(calc(100% + 30px));opacity:0}
}

@keyframes catWiggle{
  0%,100%{transform:rotate(0deg) translateY(0)}
  25%{transform:rotate(-7deg) translateY(-1px)}
  50%{transform:rotate(0deg) translateY(0)}
  75%{transform:rotate(7deg) translateY(-1px)}
}

.paw-burst{
  position:fixed;
  z-index:255;
  pointer-events:none;
  font-size:22px;
  animation:pawBurst .75s ease-out forwards;
}

@keyframes pawBurst{
  from{opacity:1;transform:translate(-50%,-50%) scale(.6) rotate(0deg)}
  to{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.35) rotate(var(--r))}
}

.cat-sparkle{
  position:fixed;
  z-index:254;
  pointer-events:none;
  font-size:18px;
  animation:sparklePop .9s ease-out forwards;
}

@keyframes sparklePop{
  from{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  30%{opacity:1}
  to{opacity:0;transform:translate(-50%,-86px) scale(1.2)}
}

.tab:hover,
.btn:hover,
.opt:hover{
  transform:translateY(-2px);
}

.btn.pri{
  position:relative;
  overflow:hidden;
}

.btn.pri::after{
  content:"";
  position:absolute;
  inset:-40% -80%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
  transform:translateX(-80%) rotate(18deg);
  animation:buttonShine 4.6s ease-in-out infinite;
}

@keyframes buttonShine{
  0%,55%{transform:translateX(-80%) rotate(18deg)}
  72%,100%{transform:translateX(80%) rotate(18deg)}
}

.chcard{
  position:relative;
  overflow:hidden;
}

.chcard::after{
  content:"🐾";
  position:absolute;
  right:13px;
  bottom:8px;
  font-size:24px;
  opacity:0;
  transform:rotate(-18deg) scale(.8);
  transition:.18s;
}

.chcard:hover::after{
  opacity:.20;
  transform:rotate(8deg) scale(1);
}

.choice{
  position:relative;
  overflow:hidden;
}

.choice:hover::after{
  content:"";
  position:absolute;
  right:14px;
  top:50%;
  width:30px;
  height:30px;
  background:radial-gradient(circle,#ffdbe7 0 34%,transparent 36%);
  opacity:.45;
  transform:translateY(-50%);
}

.choice.sel-ok::before{
  content:"にゃいす！";
  position:absolute;
  right:12px;
  top:8px;
  color:var(--ok);
  font-weight:700;
  font-size:12px;
}

.choice.sel-ng::before{
  content:"どんまいにゃ";
  position:absolute;
  right:12px;
  top:8px;
  color:var(--ng);
  font-weight:700;
  font-size:12px;
}

.cat-mascot{
  animation:mascotFloat 3.4s ease-in-out infinite;
}

@keyframes mascotFloat{
  0%,100%{transform:translateY(0)}

{h:'IoT・AIのビジネス活用', b:'IoTはモノがインターネットにつながる仕組みで、センサーから収集したビッグデータをAIで分析し新しい価値を生みます。機器を遠隔監視して故障予兆を検知する予知保全、現実世界をデジタル空間に再現するデジタルツイン、機器側でデータ処理するエッジコンピューティングが代表例。自動運転、ドローン、スマート農業、ワントゥワンの広告配信などの応用例も問われます。第4次産業革命やSociety5.0(サイバー空間と現実空間を融合した社会)というキーワードも頻出です。'},
{h:'金融・流通・行政のIT', b:'FinTechは金融×ITの造語で、電子決済やロボアドバイザなどが例。ブロックチェーンは取引履歴を鎖状につなぎ分散管理する改ざんに強い技術で、暗号資産の基盤です。キャッシュレス決済、クラウドファンディング(群衆からの資金調達)、シェアリングエコノミー、電子商取引の形態(BtoB、BtoC、CtoC)、O2O(オンラインから実店舗へ誘導)、オムニチャネルも定番。行政分野ではマイナンバー制度やe-Gov、GIGAスクール構想などのデジタル化施策が出ます。'}],
terms:[

CHAPTERS.push({
id:'s6', field:'strategy', title:'システム戦略と調達',
intro:'業務をITでどう変革するか、システムをどう調達するか。DX・クラウド・RFPあたりは近年特に問われやすいテーマです。',
sections:[
{h:'情報システム戦略と業務改革', b:'情報システム戦略は経営戦略に基づいてCIOが中心となり策定します。業務プロセスを根本から再設計するのがBPR、継続的に改善するのがBPM。EA(エンタープライズアーキテクチャ)は組織全体の業務とシステムを統一的な枠組みで整理する手法です。DX(デジタルトランスフォーメーション)はデータとデジタル技術で製品・サービスやビジネスモデル自体を変革し競争優位を確立すること。単なるIT化(デジタイゼーション)との違いが問われます。'},
{h:'業務の効率化とデータ活用', b:'ERPは会計・人事・生産・販売などの基幹業務を統合管理するパッケージ。RPAは定型的な事務作業をソフトウェアロボットで自動化する仕組みで、判断を伴わない繰り返し作業に向きます。グループウェアやチャット、Web会議などコミュニケーションツールの活用、BYOD(私物端末の業務利用)も出題されます。データ活用ではBIツール、データウェアハウス、テキストマイニングを押さえましょう。'},
{h:'クラウドとサービス利用形態', b:'クラウドサービスの3形態は超頻出。SaaSはアプリケーションまで提供(例:Webメール、Microsoft 365)、PaaSはアプリの開発・実行環境まで提供、IaaSはサーバやストレージなどのインフラのみ提供します。自社運用はオンプレミス。ハウジングは自社の機器を預ける形態、ホスティングは事業者の機器を借りる形態です。SOAはサービスの組合せでシステムを構築する考え方です。'},
{h:'システムの調達', b:'調達の流れは「RFI(情報提供依頼)→RFP(提案依頼書)→提案書・見積書の受領→選定→契約」。RFPは発注先候補にシステムの概要や要件を示し提案を求める文書で、内容の良し悪しが調達の成否を左右します。グリーン調達は環境負荷の小さい製品を優先する考え方。AI・データの利用に関する契約ガイドラインなど、外部委託時の責任分担も意識しましょう。'}],
terms:[
['DX','デジタルトランスフォーメーション。デジタル技術でビジネスモデルや組織を変革し競争優位を築くこと'],
['BPR','業務プロセスを根本的に見直し、抜本的に再設計すること'],
['ERP','企業資源計画。会計・人事・生産・販売などの基幹業務を統合管理するシステム'],
['RPA','ソフトウェアロボットによる定型業務の自動化。判断を伴わない繰り返し作業に向く'],
['SaaS','ソフトウェア(アプリケーション)をインターネット経由で提供するクラウドサービス'],
['PaaS','アプリケーションの開発・実行環境(プラットフォーム)を提供するクラウドサービス'],
['IaaS','サーバ・ストレージ・ネットワークなどのインフラを提供するクラウドサービス'],
['オンプレミス','情報システムを自社で保有・運用する形態'],
['BYOD','従業員の私物端末を業務に利用すること。利便性は高いがセキュリティ管理が課題'],
['BIツール','蓄積された大量データを分析・可視化し、経営の意思決定を支援するツール'],
['RFP','提案依頼書。調達先候補にシステム要件を示し、提案を求める文書'],
['RFI','情報提供依頼書。RFPに先立ち、ベンダに技術動向や製品情報の提供を求める文書'],
['EA','エンタープライズアーキテクチャ。組織全体の業務とシステムを体系的に整理する手法'],
['SOA','サービス指向アーキテクチャ。業務機能を部品(サービス)として組み合わせる設計思想']]
});

CHAPTERS.push({
id:'m1', field:'management', title:'システム開発技術',
intro:'システムが完成するまでの工程と、それぞれで何をするか。工程の順序とテストの対応関係(V字モデル)は確実に得点したい頻出論点です。',
sections:[
{h:'開発の流れ', b:'システム開発は大きく「要件定義→システム設計→プログラミング→テスト→受入れ→運用・保守」と進みます。要件定義では利用者の要求を整理し、機能要件(何ができるか)と非機能要件(性能・信頼性・セキュリティなど)を明確にします。設計は外部設計(利用者から見える画面・帳票など)→内部設計(プログラム内部の仕組み)の順です。'},
{h:'テストの種類', b:'テストは小さい単位から順に行います。単体テストはプログラム(モジュール)ごとの検証、結合テストはモジュール間のつながりの検証、システムテストはシステム全体が要件を満たすかの検証、受入れテスト(承認テスト)は発注者・利用者が行う最終確認です。設計工程とテスト工程が対になるV字の対応(要件定義↔受入れテスト、外部設計↔システムテスト など)を覚えましょう。'},
{h:'テスト技法とレビュー', b:'ブラックボックステストは内部構造を考慮せず入力と出力だけで検証する手法、ホワイトボックステストは内部の処理経路に着目して検証する手法です。回帰テスト(リグレッションテスト)は修正が他に影響していないか確認するテスト。成果物を人の目で検証するレビュー(ウォークスルー、インスペクション)も品質確保に重要です。'},
{h:'保守と見積り', b:'稼働後に行う機能改善やバグ修正が保守です。ソフトウェアの規模・工数の見積り手法にはファンクションポイント法(画面や帳票など機能の数と複雑さから見積もる)があります。開発規模が大きいほど工数は増え、工期は単純な比例ではない点も意識しましょう。'}],
terms:[
['要件定義','システムに必要な機能や性能を利用者の要求から明確にする工程'],
['非機能要件','性能・信頼性・セキュリティ・運用性など、機能以外の要件'],
['外部設計','利用者から見える部分(画面・帳票・操作方法など)の設計'],
['単体テスト','モジュール(プログラム)単位で行うテスト'],
['結合テスト','複数のモジュールを組み合わせ、インタフェースを検証するテスト'],
['システムテスト','システム全体が要件どおりに動作するかを検証するテスト'],
['受入れテスト','発注者・利用者側が、要求どおりかを確認する最終テスト'],
['ブラックボックステスト','内部構造を見ず、入力と出力の関係だけで検証するテスト技法'],
['ホワイトボックステスト','プログラム内部の処理経路に着目して検証するテスト技法'],
['回帰テスト','プログラム修正によって他の箇所に悪影響が出ていないか確認するテスト'],
['ファンクションポイント法','機能の数と複雑さをもとにソフトウェアの規模を見積もる手法'],
['ソフトウェア保守','稼働後のシステムに対するバグ修正や機能改善'],
['CMMI','組織の開発プロセスの成熟度を5段階で評価するモデル']]
});
CHAPTERS.push({
id:'m2', field:'management', title:'開発プロセスとアジャイル',
intro:'ウォーターフォールとアジャイルの違い、スクラムの用語はここ数年の頻出テーマ。「誰が・いつ・何をするか」をイメージで掴みましょう。',
sections:[
{h:'代表的な開発モデル', b:'ウォーターフォールモデルは要件定義から順に工程を進め、原則後戻りしない方式。大規模開発の管理がしやすい一方、仕様変更に弱いのが欠点です。プロトタイピングモデルは早い段階で試作品を作り利用者の確認を得る方式、スパイラルモデルはシステムを分割し「設計→開発→評価」を繰り返しながら完成度を高める方式です。'},
{h:'アジャイル開発', b:'アジャイルは短い期間(イテレーション)で「動くソフトウェア」を繰り返しリリースし、変化に柔軟に対応する開発手法の総称。代表がスクラムで、プロダクトオーナー(何を作るか優先順位を決める)、スクラムマスター(チームの障害を取り除く)、開発チームの3つの役割と、スプリント(1〜4週間の固定期間)、デイリースクラム(毎日の短い会議)、ふりかえり(レトロスペクティブ)などの活動から成ります。XP(エクストリームプログラミング)ではペアプログラミングやテスト駆動開発、リファクタリング(動作を変えずに内部構造を改善)が知られます。'},
{h:'DevOpsとその他の手法', b:'DevOpsは開発(Development)と運用(Operations)が密に連携し、自動化を活用して迅速かつ継続的にリリースする取組みです。継続的インテグレーション(CI)はコードの結合とテストを自動で頻繁に行う実践。モブプログラミングはチーム全員で1つの画面に向かって開発する手法です。リバースエンジニアリングは既存ソフトウェアを解析して仕様を導き出すことを指します。'}],
terms:[
['ウォーターフォールモデル','上流から下流へ工程順に進め、原則後戻りしない開発モデル'],
['プロトタイピング','開発の早い段階で試作品を作り、利用者の要求とのずれを防ぐ手法'],
['スパイラルモデル','分割した単位ごとに設計・開発・評価を繰り返して完成させる開発モデル'],
['アジャイル開発','短い反復で動くソフトウェアを継続的にリリースし、変化に対応する開発手法'],
['スクラム','アジャイルの代表的手法。スプリントと呼ばれる固定期間で開発を繰り返す'],
['プロダクトオーナー','作る物の優先順位(プロダクトバックログ)に責任をもつスクラムの役割'],
['スクラムマスター','スクラムが円滑に進むようチームを支援し、障害を取り除く役割'],
['スプリント','スクラムにおける1〜4週間程度の固定された開発期間'],
['ペアプログラミング','2人1組で対話しながら1つのプログラムを開発する手法'],
['テスト駆動開発','先にテストコードを書き、それを通すように実装を進める開発手法'],
['リファクタリング','外部から見た動作を変えずに、プログラムの内部構造を改善すること'],
['DevOps','開発と運用が連携・協力し、自動化を活用して迅速にリリースする取組み'],
['リバースエンジニアリング','既存のソフトウェアを解析して、設計情報や仕様を取り出すこと']]
});
CHAPTERS.push({
id:'m3', field:'management', title:'プロジェクトマネジメント',
intro:'納期・コスト・品質をどう管理するか。WBS・ガントチャート・アローダイアグラムは計算問題も含めて毎回出る鉄板分野です。',
sections:[
{h:'プロジェクトとは', b:'プロジェクトは「独自の成果物を、定められた期間で」生み出す活動で、定常業務と区別されます。知識体系PMBOKでは、統合・スコープ・スケジュール・コスト・品質・資源・コミュニケーション・リスク・調達・ステークホルダの管理領域が定義されています。スコープとはプロジェクトの作業範囲と成果物の範囲のことです。'},
{h:'計画と進捗の管理', b:'WBSは成果物や作業を階層的に細かく分解する手法で、作業の漏れを防ぎ見積りや分担の基礎になります。ガントチャートは作業ごとの予定と実績を横棒で表し進捗を視覚化します。マイルストーンは「結合テスト完了」など重要な節目のこと。リスクマネジメントでは、リスクを特定・分析し、回避・軽減・転嫁(保険など)・受容の対応を選びます。'},
{h:'アローダイアグラムとクリティカルパス', b:'アローダイアグラム(PERT図)は作業の順序関係を矢印で表した図です。開始から終了までの経路のうち所要日数が最長の経路をクリティカルパスと呼び、この経路上の作業が遅れるとプロジェクト全体が遅れます。「全体の最短完了日数=クリティカルパスの長さ」です。計算問題では各経路の日数を合計して最長を選びます。'},
{h:'コストと品質', b:'コスト見積りでは、人数×期間の人月という単位がよく使われます。例えば10人月の作業を5人で行えば2か月かかる計算です(実際は分担の限界もあります)。品質管理ではレビューやテストの結果を分析し、バグの発生傾向を管理図などで監視します。'}],
terms:[
['PMBOK','プロジェクトマネジメントの知識を体系化した世界標準のガイド'],
['ステークホルダ','プロジェクトの利害関係者。顧客・経営者・メンバーなど'],
['スコープ','プロジェクトで実施する作業範囲と成果物の範囲'],
['WBS','作業を階層的に分解して整理する手法。漏れ防止と見積りの基礎になる'],
['ガントチャート','作業の予定と実績を横棒で示し、進捗を管理する図'],
['マイルストーン','プロジェクトの重要な節目となるイベントや期日'],
['アローダイアグラム','作業の順序関係を矢印で表すネットワーク図(PERT図)'],
['クリティカルパス','開始から終了までの経路のうち、所要日数が最長の経路。遅延が全体に直結する'],
['リスク転嫁','保険加入や外部委託などにより、リスクの影響を第三者に移す対応'],
['リスク受容','影響が小さいリスクについて、対策をとらずそのまま受け入れる対応'],
['人月','1人が1か月働く作業量を表す単位。10人月=5人なら2か月'],
['プロジェクト憲章','プロジェクトの目的や体制を定め、立ち上げを正式に認可する文書']]
});
CHAPTERS.push({

intro:'システムを安定して使い続けるための運用管理と、それを第三者がチェックする監査の仕組み。SLAとインシデント管理が2大頻出ワードです。',
sections:[
{h:'ITサービスマネジメントとSLA', b:'ITサービスマネジメントは、ITサービスを安定的・継続的に提供するための運用管理活動で、ベストプラクティス集としてITILが知られます。SLA(サービスレベル合意書)は提供者と利用者の間で「稼働率99.5%以上」などサービスの品質目標を合意する文書。合意したレベルを維持・改善する活動がSLM(サービスレベル管理)です。'},
{h:'サービスサポートの活動', b:'インシデント管理は障害発生時に「サービスをできるだけ早く復旧させる」ことが目的(原因の徹底究明は問題管理の役割)。問題管理は根本原因を特定し再発を防止します。変更管理は変更の影響を評価して承認し、リリース管理は変更を本番環境へ展開します。利用者の問合せを一元的に受け付ける窓口がサービスデスクで、FAQやチャットボットの活用も進んでいます。'},

intro:'PCの中身と、システム全体の性能・信頼性の話。稼働率の計算とRAIDは計算・知識の両面で問われる頻出テーマです。',
sections:[
{h:'コンピュータの構成', b:'コンピュータは制御・演算・記憶・入力・出力の5装置から成り、制御と演算を担うのがCPUです。CPUの性能はクロック周波数(GHz)やコア数で決まります。記憶階層は「レジスタ→キャッシュメモリ→主記憶→補助記憶」の順に低速・大容量になります。キャッシュメモリはCPUと主記憶の速度差を埋める高速メモリです。主記憶にはRAM(電源を切ると消える揮発性)、ROM(読出し専用・不揮発性)があります。'},
{h:'補助記憶と入出力', b:'補助記憶にはHDD(磁気ディスク)、高速で衝撃に強いSSD(フラッシュメモリ)、光ディスク(DVD、Blu-ray)などがあります。インタフェースではUSB、近距離無線のBluetooth、非接触ICのNFCが頻出。デバイスドライバは周辺機器を制御するソフトウェア、プラグアンドプレイは接続するだけで使える仕組みです。IoTで使われる各種センサー(温度、加速度、GPSなど)とアクチュエータ(電気信号を物理的な動きに変える装置)も出題されます。'},
{h:'システム構成と信頼性', b:'処理形態には集中処理と分散処理、クライアントサーバシステムがあります。信頼性向上の構成として、2系統を並行稼働させ即時に切り替えるデュプレックスシステムやホットスタンバイ、複数系統で同じ処理をして照合するデュアルシステムがあります。フォールトトレラントは故障してもシステム全体を止めない設計、フェールセーフは故障時に安全側に動作させる設計(例:信号機が故障したら赤)、フェールソフトは機能を落としてでも稼働継続、フールプルーフは人の誤操作を防ぐ設計です。仮想化は1台の物理サーバ上で複数の仮想サーバを動かす技術です。'},
{h:'稼働率の計算', b:'信頼性指標のMTBF(平均故障間隔=正常に動く平均時間)とMTTR(平均修理時間)から、稼働率=MTBF÷(MTBF+MTTR)で求めます。直列システムの稼働率は各装置の稼働率の積、並列システム(どちらか動けばよい)は1−(1−a)(1−b)です。RAIDは複数台のディスクをまとめて信頼性や速度を高める技術で、RAID0(ストライピング:高速化のみ)、RAID1(ミラーリング:同じデータを2台に書く)、RAID5(パリティ分散で1台故障に耐える)を区別しましょう。'}],

sections:[

['絶対パス','ルートディレクトリを起点としてファイルの場所を示す表記'],
['OSS','ソースコードが公開され、自由に改変・再配布できるソフトウェア'],
['絶対参照','表計算で複写してもセル参照がずれない参照方式($A$1)'],
['主キー','表の中の行を一意に識別するための列。重複・NULLは不可'],

['正規化','データの重複や矛盾を防ぐために表を適切に分割すること'],

sections:[

{h:'プロトコルとTCP/IP', b:'プロトコルは通信の約束事。インターネットの基盤はTCP/IPです。役割の対応が頻出:HTTP/HTTPSはWebページの転送(HTTPSは暗号化付き)、SMTPはメール送信、POP3/IMAPはメール受信(IMAPはサーバ上で管理)、FTPはファイル転送、NTPは時刻合わせ。通信相手の特定にはIPアドレスを使い、世界で一意なグローバルIPアドレスと組織内のプライベートIPアドレスがあります。MACアドレスは機器固有の番号です。'},
{h:'DNSとインターネットの仕組み', b:'DNSはドメイン名(例:example.jp)とIPアドレスを対応付けて変換する仕組みです。URLは「スキーム://ホスト名.ドメイン名/パス」という構造。メールアドレスの@より後ろはドメイン名です。cc(カーボンコピー)は他の受信者にもアドレスが見え、bcc は他の受信者からアドレスが見えません。DHCPは端末にIPアドレスを自動的に割り当てるプロトコルです。'},

intro:'ITパスポート最大の出題ボリュームをもつ分野。攻撃手法・暗号・認証・管理の枠組みを体系的に押さえれば最大の得点源になります。',
sections:[
{h:'脅威と攻撃手法', b:'マルウェアは悪意あるソフトウェアの総称で、ウイルス、自己増殖するワーム、正常を装うトロイの木馬、データを暗号化して身代金を要求するランサムウェア、情報を盗むスパイウェアがあります。攻撃手法では、本物そっくりの偽サイトに誘導して情報を盗むフィッシング、サーバに大量のデータを送り付けるDoS攻撃(複数台からならDDoS)、IDとパスワードの使い回しを狙うパスワードリスト攻撃、総当たりのブルートフォース攻撃、Webの脆弱性を突くSQLインジェクション・クロスサイトスクリプティング、人の心理の隙を突くソーシャルエンジニアリング(のぞき見=ショルダーハッキングなど)、特定組織を狙う標的型攻撃が頻出です。'},
{h:'暗号化とディジタル署名', b:'共通鍵暗号方式は暗号化と復号に同じ鍵を使い高速ですが、鍵の受渡しと管理が課題(相手ごとに鍵が必要)。公開鍵暗号方式は公開鍵と秘密鍵のペアを使い、受信者の公開鍵で暗号化し受信者の秘密鍵で復号します。ディジタル署名は送信者の秘密鍵で署名し、送信者の公開鍵で検証することで、本人が作成したこと(なりすまし防止)と改ざんがないことを確認できます。公開鍵の正当性を認証局(CA)が証明する仕組みがPKIです。WebではTLS(https)で通信を暗号化します。無線LANの暗号化規格はWPA2/WPA3です。'},
{h:'認証とアクセス管理', b:'認証の3要素は、知識(パスワード)・所有(ICカード、スマホ)・生体(指紋、顔)。2つ以上を組み合わせる多要素認証が推奨されます。ワンタイムパスワードは1回限りのパスワード、シングルサインオン(SSO)は1回の認証で複数サービスを利用できる仕組みです。アクセス権は必要最小限の権限のみ与えるのが原則(最小権限の原則)。社内ネットワークとインターネットの間に置く防御の仕組みとして、通信を制御するファイアウォール、不正侵入を検知するIDS/防ぐIPS、外部に公開するサーバを置くDMZがあります。何も信頼せず常に検証するゼロトラストという考え方も登場しています。'},
{h:'情報セキュリティマネジメント', b:'情報セキュリティの3要素(CIA)は、機密性(許可された人だけがアクセスできる)、完全性(改ざんされず正確である)、可用性(必要なときに使える)。これに真正性や否認防止などを加えることもあります。組織的に管理する枠組みがISMSで、リスクアセスメント(特定→分析→評価)を行い、PDCAで継続的に改善します。情報セキュリティポリシは基本方針・対策基準・実施手順の階層で構成。インシデントに対応する組織をCSIRTと呼びます。退職者のアカウント削除、ソフトウェアの更新(セキュリティパッチ適用)、バックアップなどの人的・技術的対策も具体例として問われます。'}],

Q('s1','企業が、利益の追求だけでなく、環境保全や社会貢献などの社会的責任を果たすべきとする考え方はどれか。',['コーポレートガバナンス','CSR','コンプライアンス','ディスクロージャ'],1,'CSR(Corporate Social Responsibility)は企業の社会的責任。コーポレートガバナンスは企業統治、コンプライアンスは法令遵守、ディスクロージャは情報公開です。');
Q('s1','PDCAサイクルの「C」で行う活動として、最も適切なものはどれか。',['業務の改善策を実施する','目標と実績の差異を評価する','業務の計画を立案する','計画に基づき業務を実行する'],1,'CはCheck(評価)。計画(Plan)→実行(Do)→評価(Check)→改善(Act)の順です。改善策の実施はAct。');
Q('s1','大規模な自然災害の発生に備え、重要な事業を中断させず、中断しても早期に復旧させるために策定する計画はどれか。',['BPR','SLA','BCP','RFP'],2,'BCP(事業継続計画)が正解。BPRは業務プロセスの再設計、SLAはサービスレベル合意書、RFPは提案依頼書です。');
Q('s1','製品別や地域別に編成され、それぞれが利益責任をもつ組織形態はどれか。',['職能別組織','マトリックス組織','プロジェクト組織','事業部制組織'],3,'事業部制組織は製品別・地域別などの単位で利益責任をもちます。マトリックス組織は2系統の指揮命令が交差する形態です。');
Q('s1','従業員自らが業務目標を設定し、その達成度に基づいて評価を行う制度はどれか。',['OJT','MBO','CDP','360度評価'],1,'MBO(目標による管理)が正解。OJTは職場内訓練、360度評価は上司・同僚・部下など複数の視点による評価です。');
Q('s1','経営層の役職のうち、情報管理や情報システム戦略を統括する責任者はどれか。',['CEO','CFO','CIO','COO'],2,'CIO(Chief Information Officer:最高情報責任者)。CEOは経営、CFOは財務、COOは業務執行の最高責任者です。');
Q('s2','項目を出現頻度の高い順に並べた棒グラフと累積比率の折れ線グラフを組み合わせ、重点的に管理すべき項目を把握する図はどれか。',['散布図','特性要因図','パレート図','管理図'],2,'パレート図の説明です。ABC分析に使われます。特性要因図は原因と結果の整理、散布図は相関、管理図は工程の異常検出に使います。');
Q('s2','ブレーンストーミングの進め方として、適切なものはどれか。',['他人の意見を批判して質を高める','奇抜な意見は除外する','他人の意見に便乗した発言を歓迎する','質を重視し発言数を絞る'],2,'ブレーンストーミングの4原則は「批判禁止・自由奔放・質より量・便乗歓迎」。便乗(結合改善)は歓迎されます。');
Q('s2','ある時点における企業の資産・負債・純資産の状態を表す財務諸表はどれか。',['損益計算書','キャッシュフロー計算書','貸借対照表','株主資本等変動計算書'],2,'貸借対照表(B/S)は一時点の財政状態を示します。損益計算書は一定期間の経営成績、キャッシュフロー計算書は現金の流れを示します。');
Q('s2','固定費が3,000万円、変動費率が0.6のとき、損益分岐点売上高は何万円か。',['1,800万円','3,000万円','5,000万円','7,500万円'],3,'損益分岐点売上高=固定費÷(1−変動費率)=3,000÷(1−0.6)=3,000÷0.4=7,500万円。変動費率が高いほど損益分岐点は高くなります。');
Q('s2','売上高100万円、変動費40万円、固定費30万円のときの利益は何万円か。',['10万円','30万円','40万円','60万円'],1,'利益=売上高−変動費−固定費=100−40−30=30万円。限界利益(売上−変動費)は60万円です。');
Q('s3','著作権法による保護の対象となるものはどれか。',['プログラム言語','アルゴリズム','プログラム','プロトコル'],2,'著作権はプログラム(表現)を保護しますが、プログラム言語・アルゴリズム(アイデア)・プロトコル(規約)は保護対象外です。');
Q('s3','産業財産権のうち、物品のデザイン(形状・模様・色彩)を保護する権利はどれか。',['特許権','実用新案権','意匠権','商標権'],2,'意匠権はデザインの保護。特許権は発明、実用新案権は物品の構造等の考案、商標権はマークやロゴを保護します。');
Q('s3','不正アクセス禁止法で禁止されている行為はどれか。',['電子メールで広告を無断送信する行為','他人のIDとパスワードを無断で使用してログインする行為','ウイルスを作成する行為','個人情報を目的外に利用する行為'],1,'他人の識別符号の無断使用は不正アクセス禁止法違反。ウイルス作成は刑法(不正指令電磁的記録に関する罪)、個人情報の目的外利用は個人情報保護法の規制対象です。');
Q('s3','A社がシステム開発をB社に請負契約で委託した。このときの作業者への指揮命令権に関する記述として、適切なものはどれか。',['発注者であるA社が指揮命令を行う','受託者であるB社が指揮命令を行う','A社とB社が協議のうえ共同で指揮命令を行う','作業場所がA社内であればA社が指揮命令を行う'],1,'請負契約では指揮命令権は請負側(B社)にあります。発注者が直接指示すると偽装請負となり違法です。派遣契約では派遣先に指揮命令権があります。');
Q('s3','製造物責任法(PL法)に関する記述として、適切なものはどれか。',['ソフトウェア単体の欠陥も賠償責任の対象となる','製品の欠陥によって生じた損害について製造業者が賠償責任を負う','製造業者の過失を被害者が立証しなければ賠償されない','輸入業者は責任を負わない'],1,'PL法は製品の欠陥による損害について製造業者等(輸入業者含む)に賠償責任を課します。過失の立証は不要(欠陥の存在を立証)。ソフトウェア単体は対象外です。');
Q('s4','SWOT分析において、外部環境の「機会」に分類されるものはどれか。',['自社の優れた技術力','競合他社の新規参入','規制緩和による市場拡大','自社の販売網の弱さ'],2,'機会(O)は外部環境のプラス要因。規制緩和による市場拡大が該当します。技術力は強み(S)、販売網の弱さは弱み(W)、競合の参入は脅威(T)です。');
Q('s4','PPMにおいて、市場成長率が低く、市場占有率が高い事業の分類はどれか。',['花形','金のなる木','問題児','負け犬'],1,'低成長・高シェアは「金のなる木」。追加投資が少なく安定した資金源となります。花形は高成長・高シェア、問題児は高成長・低シェアです。');
Q('s4','マーケティングミックスにおける4Pに含まれないものはどれか。',['Product(製品)','Price(価格)','Process(プロセス)','Promotion(販売促進)'],2,'4PはProduct・Price・Place(流通)・Promotionです。Processは含まれません。');
Q('s4','新製品の発売時に高い価格を設定し、早期に開発費の回収を図る価格戦略はどれか。',['ペネトレーションプライシング','スキミングプライシング','ダイナミックプライシング','フリーミアム'],1,'スキミングプライシング(上澄み吸収価格戦略)の説明です。ペネトレーションは低価格でシェア獲得、ダイナミックは需要に応じた変動価格です。');
Q('s4','企業全体の経営目標の達成度を測る指標をKGIとするとき、その達成に向けた中間的なプロセスの実施状況を測る指標はどれか。',['KPI','CSF','ROE','BSC'],0,'KPI(重要業績評価指標)は中間プロセスの指標。CSFは重要成功要因、ROEは自己資本利益率、BSCはバランススコアカードです。');
Q('s4','他社がまねのできない、自社ならではの中核的な能力を表す用語はどれか。',['アライアンス','コアコンピタンス','フランチャイズ','アウトソーシング'],1,'コアコンピタンスが正解。アライアンスは企業間提携、アウトソーシングは業務の外部委託です。');
Q('s5','新技術が初期採用者層から一般消費者層へ普及する際に存在する、超えることが難しい溝を表す用語はどれか。',['キャズム','死の谷','イノベーションのジレンマ','カニバリゼーション'],0,'キャズムの説明です。死の谷は研究開発から事業化への障壁、イノベーションのジレンマは優良企業が破壊的技術に乗り遅れる現象です。');
Q('s5','現実世界の設備や機器から収集したデータをもとに、デジタル空間上に現実と同等の環境を再現する技術はどれか。',['VR','デジタルツイン','メタバース','AR'],1,'デジタルツインの説明です。製造業で故障予測やシミュレーションに使われます。VRは仮想現実、ARは現実への情報の重畳です。');
Q('s5','IoTシステムにおいて、クラウドにデータを送る前に、端末の近くに配置したコンピュータで処理を行う方式はどれか。',['グリッドコンピューティング','エッジコンピューティング','オンプレミス','ピアツーピア'],1,'エッジコンピューティングは端末側(エッジ)で処理することで、通信の遅延や負荷を減らします。');
Q('s5','ブロックチェーンの特徴として、最も適切なものはどれか。',['取引記録を1台の中央サーバで集中管理する','取引記録を暗号技術によって鎖状につなぎ、分散して管理する','記録の修正・削除が容易にできる','政府機関の認証を受けたデータのみ記録できる'],1,'ブロックチェーンは取引履歴をハッシュでつなぎ、参加者で分散管理するため改ざんが極めて困難です。中央管理者は不要です。');

Q('m1','システム開発のプロセスを、実施する順に並べたものはどれか。',['システム設計→要件定義→テスト→プログラミング','要件定義→システム設計→プログラミング→テスト','プログラミング→システム設計→要件定義→テスト','要件定義→プログラミング→システム設計→テスト'],1,'要件定義→設計→プログラミング→テストの順です。何を作るか決めてから設計し、作ってから検証します。');

Q('m2','アジャイル開発の特徴として、最も適切なものはどれか。',['開発初期に全ての仕様を確定してから開発する','ドキュメントの作成を最優先する','短い期間の反復で動くソフトウェアを継続的に提供する','工程ごとに担当部署を分けて順番に作業する'],2,'アジャイルは変化への対応を重視し、イテレーション(スプリント)ごとに動くソフトウェアをリリースします。');

Q('m2','XP(エクストリームプログラミング)のプラクティスの一つで、プログラムの外部から見た動作を変えずに、内部構造を整理・改善することはどれか。',['リファクタリング','ペアプログラミング','テスト駆動開発','継続的インテグレーション'],0,'リファクタリングの説明です。動作を変えない点がポイント。テスト駆動開発は先にテストを書く手法です。');

Q('m3','WBSを作成する目的として、最も適切なものはどれか。',['作業の進捗を金額で評価する','プロジェクトの作業を階層的に分解し、作業の漏れを防ぐ','作業間の順序関係から最長経路を求める','リスクの発生確率を計算する'],1,'WBS(Work Breakdown Structure)は成果物・作業の階層的分解。見積りや分担の基礎となり、漏れ防止に役立ちます。');

Q('m4','内部統制における職務分掌の例として、最も適切なものはどれか。',['発注担当者と支払承認者を別の人にする','全社員に同じアクセス権を与える','一人の担当者に複数の業務を兼任させて効率化する','監査を被監査部門自身が行う'],0,'職務分掌は権限を分離して不正やミスを防ぐ仕組み。発注と支払承認の分離は相互けん制の典型例です。');

Q('t3','故障が発生したとき、システムをあらかじめ安全な状態に移行させる設計の考え方はどれか。',['フェールセーフ','フールプルーフ','フォールトトレラント','フェールソフト'],0,'フェールセーフの説明(例:信号機の故障時は赤)。フールプルーフは誤操作対策、フォールトトレラントは故障しても全体を止めない設計、フェールソフトは機能を縮小して継続する設計です。');

function pawBurst(x=window.innerWidth/2,y=window.innerHeight/2,kind='🐾'){
  const dirs=[
    [-68,-34,'-22deg'],[-34,-74,'18deg'],[28,-68,'38deg'],[72,-30,'-12deg'],
    [-60,34,'26deg'],[-16,66,'-30deg'],[42,54,'16deg'],[0,-94,'0deg']
  ];
  dirs.forEach(([dx,dy,r],idx)=>{
    const s=document.createElement('span');
    s.className=idx%3===0?'cat-sparkle':'paw-burst';
    s.textContent=idx%3===0?'✨':kind;
    s.style.left=x+'px'; s.style.top=y+'px';
    s.style.setProperty('--x',dx+'px');
    s.style.setProperty('--y',dy+'px');
    s.style.setProperty('--r',r);
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),950);
  });
}

function eventPoint(ev){
  if(ev&&ev.clientX&&ev.clientY)return [ev.clientX,ev.clientY];
  return [window.innerWidth/2,window.innerHeight/2];
}

let S={read:{}, qs:{}, terms:{}, mocks:[]}; // state
let memOnly=false;
const SAVE_KEY='itp-save';
async function loadS(){
  try{
    const saved=localStorage.getItem(SAVE_KEY);
    if(saved) S=Object.assign(S,JSON.parse(saved));
  }catch(e){
    memOnly=true;
    console.warn('進捗データを読み込めませんでした。',e);
  }
}
function saveS(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(S));
    memOnly=false;
  }catch(e){
    memOnly=true;
    console.warn('進捗データを保存できませんでした。',e);
  }
}

/* ---- stats helpers ---- */
function qStats(filter){ let c=0,w=0,seen=0; QUESTIONS.forEach((q,i)=>{ if(filter&&!filter(q))return; const s=S.qs[i]; if(s){seen++;c+=s.c;w+=s.w;} }); return {c,w,seen,rate:(c+w)?Math.round(c/(c+w)*100):0}; }
function fieldOfCh(id){ const ch=CHAPTERS.find(c=>c.id===id); return ch?ch.field:''; }
function chIndex(id){ return CHAPTERS.findIndex(c=>c.id===id); }
function nextCh(id){ const i=chIndex(id); return i>=0&&i<CHAPTERS.length-1 ? CHAPTERS[i+1] : null; }
function prevCh(id){ const i=chIndex(id); return i>0 ? CHAPTERS[i-1] : null; }
function allTerms(field){ const out=[]; CHAPTERS.forEach(ch=>{ if(field&&ch.field!==field)return; ch.terms.forEach((t,i)=>out.push({key:ch.id+'#'+i,term:t[0],def:t[1],field:ch.field})); }); return out; }
function renderTermText(text,ch){
  const terms=[...ch.terms].sort((a,b)=>b[0].length-a[0].length);
  let out='', i=0;
  while(i<text.length){
    const hit=terms.find(t=>text.startsWith(t[0],i));
    if(hit){
      out+=`<button type="button" class="term-tip" onclick="toggleTermMemo(this)" aria-label="${escAttr(hit[0])}の説明を見る">${esc(hit[0])}</button><span class="term-memo" hidden><b>にゃんこ用語メモ</b><br>${esc(hit[1])}</span>`;
      i+=hit[0].length;
    }else{
      out+=esc(text[i]);
      i++;
    }
  }
  return out;
}
function toggleTermMemo(btn){
  const memo=btn.nextElementSibling;
  const willOpen=!memo||memo.hidden;
  document.querySelectorAll('.term-memo').forEach(m=>m.hidden=true);
  document.querySelectorAll('.term-tip.on').forEach(b=>b.classList.remove('on'));
  if(memo&&willOpen){ memo.hidden=false; btn.classList.add('on'); }
}
function completePromptHTML(id, stayAction=`vChapter('${id}')`, includeQuiz=false){
  const c=CHAPTERS.find(x=>x.id===id); if(!c)return '';
  const nx=nextCh(id);
  return `<div class="complete-overlay">
      <div class="complete-prompt">
        <div class="complete-title">🐾 学習完了しました！</div>
      <div class="complete-text">${nx?`次の章「${esc(nx.title)}」へ進みますか？`:'これで教科書は最後まで完了です。次は演習へ進みますか？'}</div>
      <div class="complete-actions">

        ${includeQuiz?`<button class="btn" onclick="startQuiz('${c.field}','${id}')">この章の問題を解く</button>`:''}
        <button class="btn" onclick="${stayAction}">この章に残る</button>
        <button class="btn" onclick="go('learn')">章一覧に戻る</button>
        </div>
      </div>
    </div>`;
}

        <div class="tt">${esc(c.title)}</div>

  }

}
function vChapter(id, justCompleted=false){

  const nx=nextCh(id), pv=prevCh(id);
  let html=`<div class="backrow"><button class="btn sm" onclick="go('learn')">← 章一覧へ</button><span class="fieldchip ${f.cls}">${f.name}</span></div>

  html+=`<h3>この章の重要用語</h3><table class="termtbl"><tr><th>用語</th><th>意味</th></tr>`;

    <button class="btn ${S.read[id]?'':'pri'}" onclick="markRead('${id}')">${S.read[id]?'✓ 学習済み':'この章を学習完了にする'}</button>
    <button class="btn" onclick="startQuiz('${c.field}','${id}')">この章の問題を解く</button>

  }
}

function markRead(id){ S.read[id]=1; saveS(); vChapter(id,true); pawBurst(window.innerWidth/2,window.innerHeight/2,'🐾'); showCatCutin('学習完了にゃ！次の行き先を選ぼう。','😺'); }
function unmarkRead(id){ delete S.read[id]; saveS(); vChapter(id,false); }

/* ---- FLASHCARDS ---- */
let fc={deck:[],i:0,flip:false,field:''};
function vCards(){
  const counts=Object.keys(FIELDS).map(fk=>{ const t=allTerms(fk); const k=t.filter(x=>S.terms[x.key]).length; return {fk,n:t.length,k}; });
  $main.innerHTML=`<h2 class="pg">一問一答カード</h2><div class="pgsub">用語を見て意味を思い浮かべ、タップで答え合わせ。「覚えた」用語は出題されにくくなります。すきま時間のにゃんこ学習にぴったり。</div>
  <div class="setuprow">${counts.map(c=>`<button class="opt ${fc.field===c.fk?'on':''}" onclick="fcField('${c.fk}')">${FIELDS[c.fk].name} ${c.k}/${c.n}</button>`).join('')}
  <button class="opt ${fc.field===''?'on':''}" onclick="fcField('')">全分野</button></div>
  <div class="note-cat">🐾 にゃんこ暗記のコツ：1回で覚えようとせず、短く何回も見ると強いにゃ。</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
    <button class="btn pri" onclick="fcStart(false)">未習得のカードで開始</button>

  </div><p class="note">「覚えた」の記録は端末に保存されます。リセットしたいときはすべてのカードで開始してやり直せます。</p>`;
}
function fcField(f){ fc.field=f; vCards(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function fcStart(all){
  let deck=allTerms(fc.field||null); if(fc.field==='')deck=allTerms(null);
  if(!all) deck=deck.filter(t=>!S.terms[t.key]);
  if(!deck.length){ $main.innerHTML=`<div class="empty">この範囲のカードはすべて「覚えた」になっています 🎉<br><br><button class="btn" onclick="vCards()">戻る</button></div>`; return; }
  fc.deck=shuffle(deck); fc.i=0; fc.flip=false; fcRender();
  setTimeout(()=>catModeTalk('cardStart'),120);
}
function fcRender(){
  if(fc.i>=fc.deck.length){ $main.innerHTML=`<div class="empty"><div style="font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ink)">1周おつかれさま!</div><br><button class="btn pri" onclick="fcStart(false)">未習得だけでもう1周</button> <button class="btn" onclick="vCards()">設定に戻る</button></div>`; return; }
  const t=fc.deck[fc.i]; const f=FIELDS[t.field];
  $main.innerHTML=`<div class="qmeta"><span>${fc.i+1} / ${fc.deck.length} 枚</span><span class="fieldchip ${f.cls}">${f.name}</span></div>
  <div class="progress-top"><i style="width:${Math.round(fc.i/fc.deck.length*100)}%"></i></div>
  <div class="fcard"><div class="fcinner" onclick="fc.flip=!fc.flip;fcRender()">
    ${fc.flip?`<div class="def"><b style="font-family:var(--serif);font-size:17px">${esc(t.term)}</b><br><br>${esc(t.def)}</div>`:`<div class="term">${esc(t.term)}</div>`}
    <div class="fchint">${fc.flip?'タップで表に戻る':'タップで答えを表示'}</div>
  </div></div>
  <div class="fcbtns">
    <button class="btn" style="border-color:var(--ng);color:var(--ng);box-shadow:2px 2.5px 0 var(--ng)" onclick="fcMark(false)">まだ</button>
    <button class="btn" style="border-color:var(--ok);color:var(--ok);box-shadow:2px 2.5px 0 var(--ok)" onclick="fcMark(true)">覚えた</button>
  </div>
  <p class="note" style="text-align:center;margin-top:14px"><button class="btn sm" onclick="vCards()">終了する</button></p>`;
}
function fcMark(ok){
  const t=fc.deck[fc.i];
  if(ok){ S.terms[t.key]=1; catModeTalk('cardKnown'); pawBurst(window.innerWidth/2,window.innerHeight/2,'🐾'); }
  else { delete S.terms[t.key]; catModeTalk('cardAgain'); }

}

/* ---- QUIZ (演習) ---- */
let qz={list:[],i:0,ans:null,correct:0,mode:'practice',startedAt:0,limitSec:0,timerId:null,mockFields:null,field:''};
function vQuiz(){
  const stats=Object.keys(FIELDS).map(fk=>{ const s=qStats(q=>fieldOfCh(q.ch)===fk); return {fk,s}; });
  $main.innerHTML=`<h2 class="pg">過去問演習</h2><div class="pgsub">本試験形式の四肢択一。1問ごとに解説つき。間違えた問題は「弱点復習」に自動登録されます。こわがらずにどんどん解いていこう。</div>
  <div class="setuprow">
    <button class="opt ${qz.field===''?'on':''}" onclick="qz.field='';vQuiz()">全分野ミックス</button>
    ${stats.map(x=>`<button class="opt ${qz.field===x.fk?'on':''}" onclick="qz.field='${x.fk}';vQuiz()">${FIELDS[x.fk].name}(正答率 ${x.s.seen?x.s.rate+'%':'—'})</button>`).join('')}
  </div>
  <div class="note-cat">😼 にゃんこ演習のコツ：正解しても解説を読むと、本試験で似た問題に強くなるにゃ。</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn pri" onclick="startQuiz(qz.field||null,null,10)">10問 解く</button>
    <button class="btn" onclick="startQuiz(qz.field||null,null,20)">20問 解く</button>
  </div>`;
}
function pickQuestions(field,ch,n){
  let pool=QUESTIONS.map((q,i)=>({q,i})).filter(x=>(!field||fieldOfCh(x.q.ch)===field)&&(!ch||x.q.ch===ch));
  // 出題回数が少ない問題を優先しつつシャッフル
  pool=shuffle(pool).sort((a,b)=>{ const sa=S.qs[a.i],sb=S.qs[b.i]; return ((sa?sa.c+sa.w:0)-(sb?sb.c+sb.w:0)); });
  return pool.slice(0,n||pool.length).map(x=>x.i);
}
function startQuiz(field,ch,n){
  qz={...qz,list:shuffle(pickQuestions(field,ch,n||10)),i:0,ans:null,correct:0,mode:'practice',mockFields:null,chapterId:ch||null}; 
  if(!qz.list.length){ $main.innerHTML='<div class="empty">この範囲の問題はまだありません。</div>'; return; }
  catModeTalk('quizStart');
  pawBurst(window.innerWidth/2,window.innerHeight/2,'🐾');
  qRender();
}
function qRender(){
  if(qz.i>=qz.list.length){ if(qz.mode==='mock'){mockResult();}else{qResult();} return; }
  const qi=qz.list[qz.i], q=QUESTIONS[qi]; const f=FIELDS[fieldOfCh(q.ch)];
  const answered=qz.ans!==null;
  $main.innerHTML=`<div class="qmeta">
    <span>問 ${qz.i+1} / ${qz.list.length}　<span class="fieldchip ${f.cls}">${f.name}</span></span>
    ${qz.mode==='mock'?`<span class="timer" id="tmr"></span>`:`<span>正解 ${qz.correct}</span>`}
  </div>
  <div class="progress-top"><i style="width:${Math.round(qz.i/qz.list.length*100)}%"></i></div>
  <div class="card">
    <div class="qtext">${esc(q.q)}</div>
    ${q.c.map((c,ci)=>{
      let cls='';
      if(answered){ if(ci===q.a)cls= ci===qz.ans?'sel-ok':'reveal-ok'; else if(ci===qz.ans)cls='sel-ng'; }
      return `<button class="choice ${cls}" ${answered?'disabled':''} onclick="qAnswer(${ci})"><span class="mk">${KANA[ci]}</span><span>${esc(c)}</span></button>`;
    }).join('')}
    ${answered&&qz.mode!=='mock'?`
      <div class="verdict ${qz.ans===q.a?'ok':'ng'}">${qz.ans===q.a?'○ 正解!':'× 不正解'}</div>
      <div class="expl"><b>解説</b><br>${esc(q.exp)}</div>
      <div style="margin-top:14px;text-align:right"><button class="btn pri" onclick="qNext()">${qz.i+1>=qz.list.length?'結果を見る':'次の問題へ'} →</button></div>`:''}
  </div>
  ${qz.mode==='mock'?'':'<p class="note" style="margin-top:10px;text-align:center"><button class="btn sm" onclick="go(\'quiz\')">演習を中断する</button></p>'}`;
  if(qz.mode==='mock') updTimer();
}
function qAnswer(ci){
  if(qz.ans!==null)return;
  const qi=qz.list[qz.i], q=QUESTIONS[qi];
  qz.ans=ci;
  const st=S.qs[qi]||(S.qs[qi]={c:0,w:0,lw:false});
  if(ci===q.a){
    qz.correct++; st.c++; st.lw=false;
    if(qz.mode!=='mock'){ const [x,y]=eventPoint(event); pawBurst(x,y,'🐾'); showCatCutin('正解にゃ！その調子！','😸'); }
  } else {
    st.w++; st.lw=true;
    if(qz.mode!=='mock'){ const [x,y]=eventPoint(event); pawBurst(x,y,'💧'); showCatCutin('惜しいにゃ。解説で取り返そう！','🙀'); }
  }
  saveS();
  if(qz.mode==='mock'){
    qz.fieldRec.push({f:fieldOfCh(q.ch),ok:ci===q.a}); qz.ans=null; qz.i++;
    if(qz.i>0 && qz.i<qz.list.length && qz.i%10===0)setTimeout(()=>showCatCutin(`${qz.i}問進んだにゃ。深呼吸して続けよう！`,'⏱️'),120);
    qRender();
  }
  else qRender();
}
function qNext(){
  qz.ans=null; qz.i++;
  if(qz.i>0 && qz.i<qz.list.length && qz.i%3===0) setTimeout(()=>catModeTalk('quizMilestone'),120);
  qRender();
}
function completeChapterFromQuiz(id){
  S.read[id]=1; saveS();
  pawBurst(window.innerWidth/2,window.innerHeight/2,'🐾');
  showCatCutin('この章も学習完了にしたにゃ！','😺');
  const box=document.getElementById('quizCompletePrompt');
  if(box) box.innerHTML=completePromptHTML(id,`qResult()`,false);
}
function qResult(){
  const rate=Math.round(qz.correct/qz.list.length*100);
  $main.innerHTML=`<div class="card" style="text-align:center;padding:30px 20px">
    <div class="note">演習結果</div>
    <div class="scorebig">${qz.correct}<small> / ${qz.list.length} 問正解(${rate}%)</small></div>
    <p style="font-size:13.5px;color:var(--ink2);margin:10px 0 18px">${rate>=80?'仕上がってきています。次は模試で本番形式に挑戦!':rate>=60?'合格圏が見えてきました。間違えた問題の解説を読み返そう。':'まだ伸びしろたっぷり。教科書に戻って該当章を読み直すのが近道です。'}</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      ${qz.chapterId&&!S.read[qz.chapterId]?`<button class="btn pri" onclick="completeChapterFromQuiz('${qz.chapterId}')">この章を学習完了にする 🐾</button>`:''}
      ${qz.chapterId?`<button class="btn pri" onclick="vChapter('${qz.chapterId}')">教科書のこの章へ戻る 📚</button>`:''}
      ${qz.chapterId?`<button class="btn" onclick="startQuiz('${fieldOfCh(qz.chapterId)}','${qz.chapterId}')">この章の問題をもう一度解く</button>`:''}
      <button class="btn ${qz.chapterId?'':'pri'}" onclick="go('quiz')">${qz.chapterId?'演習メニューへ':'もう一度演習する'}</button>
      <button class="btn" onclick="go('weak')">弱点を復習する</button>
      <button class="btn" onclick="go('home')">ホームへ</button>
    </div>
    <div id="quizCompletePrompt"></div>
  </div>`;
  setTimeout(()=>{
    if(rate>=90)showCatCutin('ほぼ完璧にゃ！模試へ行ってもよさそう！','😻');
    else if(rate>=80)showCatCutin('すごいにゃ！模試もいけそう！','😸');
    else if(rate>=60)showCatCutin('いい感じにゃ。弱点をつぶそう！','🐱');
    else showCatCutin('ここから伸びるにゃ。あせらず復習！','😺');
  },120);
}

/* ---- MOCK EXAM ---- */
function vMock(){
  let hist='';
  if(S.mocks.length){
    hist=`<div class="card" style="margin-top:18px"><h3 style="font-family:var(--serif);margin-bottom:8px">受験履歴</h3><table class="mockhist"><tr><th>日付</th><th>総合</th><th>スト</th><th>マネ</th><th>テク</th><th>判定</th></tr>`+
    S.mocks.slice(-8).reverse().map(m=>`<tr><td>${m.date}</td><td><b>${m.total}</b></td><td>${m.fs.strategy}</td><td>${m.fs.management}</td><td>${m.fs.technology}</td><td>${m.pass?'<b style="color:var(--ok)">合格</b>':'<span style="color:var(--ng)">不合格</span>'}</td></tr>`).join('')+`</table></div>`;
  }
  $main.innerHTML=`<h2 class="pg">模擬試験</h2><div class="pgsub">本試験と同じ分野比率で30問を出題(制限時間36分=本試験と同じペース)。解説は試験後にまとめて確認できます。</div>
  <div class="note-cat">🐱 にゃんこ模試の心得：迷ったら印象で止まらず、明らかに違う選択肢から消していこう。</div>
  <div class="card">
    <table class="termtbl">
      <tr><td>出題数</td><td>30問(ストラテジ10・マネジメント6・テクノロジ14)</td></tr>
      <tr><td>制限時間</td><td>36分(時間切れで自動終了)</td></tr>
      <tr><td>合格判定</td><td>総合600/1000以上 かつ 各分野300/1000以上(本試験と同じ基準で換算)</td></tr>
    </table>
    <div style="margin-top:16px"><button class="btn pri" onclick="startMock()">模擬試験を開始する</button></div>
  </div>${hist}`;
}
function startMock(){
  const pick=(f,n)=>shuffle(pickQuestions(f,null,999)).slice(0,n);
  const list=shuffle([...pick('strategy',10),...pick('management',6),...pick('technology',14)]);
  qz={list,i:0,ans:null,correct:0,mode:'mock',startedAt:Date.now(),limitSec:36*60,fieldRec:[],field:qz.field,chapterId:null};
  clearInterval(qz.timerId); qz.timerId=setInterval(updTimer,1000);
  showCatCutin('模試スタートにゃ。正誤は最後まで秘密！','😼');
  pawBurst(window.innerWidth/2,window.innerHeight/2,'🐾');
  qRender();
}
function updTimer(){
  const el=document.getElementById('tmr'); if(!el){return;}
  const left=qz.limitSec-Math.floor((Date.now()-qz.startedAt)/1000);
  if(left<=0){ clearInterval(qz.timerId); mockResult(); return; }
  el.textContent=`残り ${String(Math.floor(left/60)).padStart(2,'0')}:${String(left%60).padStart(2,'0')}`;
  if(left<=180)el.style.color='var(--ng)';
}
function qResultDispatch(){ qz.mode==='mock'?mockResult():qResult(); }
function mockResult(){
  clearInterval(qz.timerId);
  const rec=qz.fieldRec||[];
  const per=f=>{ const r=rec.filter(x=>x.f===f); return r.length?Math.round(r.filter(x=>x.ok).length/r.length*1000):0; };
  const fs={strategy:per('strategy'),management:per('management'),technology:per('technology')};
  const total=rec.length?Math.round(rec.filter(x=>x.ok).length/rec.length*1000):0;
  const pass=total>=600&&fs.strategy>=300&&fs.management>=300&&fs.technology>=300;
  const d=new Date(); const date=`${d.getMonth()+1}/${d.getDate()}`;
  S.mocks.push({date,total,fs,pass}); if(S.mocks.length>30)S.mocks.shift(); saveS();
  $main.innerHTML=`<div class="card" style="text-align:center;padding:30px 20px">
    <div class="note">模擬試験 結果(1000点満点換算)</div>
    <div class="scorebig">${total}<small> 点</small></div>
    <div class="passband ${pass?'ok':'ng'}">${pass?'合格ライン突破!':'不合格(基準:総合600 & 各分野300)'}</div>
    <div class="fbreak">
      ${Object.keys(FIELDS).map(fk=>`<div class="stat"><div class="lb">${FIELDS[fk].name}</div><div class="vl" style="font-size:22px;color:${fs[fk]>=300?'var(--ink)':'var(--ng)'}">${fs[fk]}<small>/1000</small></div><div class="bar"><i style="width:${fs[fk]/10}%;background:${fs[fk]>=300?'var(--matcha)':'var(--ng)'}"></i></div></div>`).join('')}
    </div>
    <p style="font-size:13.5px;color:var(--ink2);margin:16px 0">${pass?'この調子で3回連続クリアできたら、本試験の申込みを!':'300点未満の分野があれば、その分野の教科書と演習を重点的に。'}</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn pri" onclick="go('weak')">間違えた問題を復習</button>
      <button class="btn" onclick="startMock()">もう一度受験</button>
      <button class="btn" onclick="go('mock')">模試トップへ</button>
    </div></div>`;
  setTimeout(()=>showCatCutin(pass?'合格ライン突破にゃ！すごい！':'あと一歩にゃ。弱点復習へいこう！',pass?'😻':'🐱'),120);
}

/* ---- WEAK REVIEW ---- */
function vWeak(){

    $main.innerHTML=`<h2 class="pg">弱点復習</h2><div class="empty">いま復習が必要な問題はありません。<br>演習や模試で間違えた問題が、ここに自動で集まります。<br><br><button class="btn pri" onclick="go('quiz')">演習へ</button></div>`;
    setTimeout(()=>showCatCutin('弱点なしにゃ！すごい！演習で腕だめししよう。','😻'),150);
    return;
  }
  setTimeout(()=>showCatCutin(`復習する問題が ${weak.length} 問あるにゃ。1つずつ倒そう！`,'🐾'),150);
  $main.innerHTML=`<h2 class="pg">弱点復習</h2><div class="pgsub">最後に間違えたままの問題が ${weak.length} 問あります。正解すればリストから消えます。</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"><button class="btn pri" onclick="startWeak()">弱点だけ解き直す(${Math.min(weak.length,15)}問)</button></div>
  <div class="grid2">${weak.slice(0,30).map(i=>{ const q=QUESTIONS[i]; const f=FIELDS[fieldOfCh(q.ch)]; const ch=CHAPTERS.find(c=>c.id===q.ch);
    return `<div class="card" style="padding:13px 15px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span class="fieldchip ${f.cls}">${f.name}</span><span class="tag-weak">要復習</span></div><div style="font-size:13.5px;font-weight:700;line-height:1.6">${esc(q.q)}</div><div class="note" style="margin-top:6px">該当章:<a href="javascript:void(0)" onclick="vChapter('${q.ch}')" style="color:var(--indigo)">${esc(ch.title)}</a></div></div>`; }).join('')}</div>`;
